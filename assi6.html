<!DOCTYPE html>
<html>

<head>
    <title>Form Validation</title>
    <style>
        body {
            background-color: lightblue;
            text-align: center;
        }
        
        input {
            background-color: rgb(204, 180, 178);
            color: rgb(189, 0, 0);
        }
        
        h1 {
            color: rgb(17, 16, 16);
        }
        
        label {
            color: rgb(81, 255, 0):
        }
    </style>
    <script>
        function validateForm() {
            var name = document.getElementById("name").value;
            var email = document.getElementById("email").value;
            var phoneno = document.getElementById("phoneno").value;
            var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (name == "") {
                alert("Name field cannot be empty");
                return false;
            }
            if (email == "") {
                alert("Email field cannot be empty");
                return false;
            }
            if (!emailPattern.test(email)) {
                alert("Please enter a valid email address");
                return false;
            }
            if (phoneno == "") {
                alert("phoneno field cannot be empty");
                return false;
            }
            if (age == "") {
                alert("age field cannot be empty");
                return false;
            }
            if (date == "") {
                alert("date of birth field cannot be empty");
                return false;
            }
            alert("Form submitted successfully!");
            return true;
        }
    </script>
</head>

<body>
    <h1>User Registration Form</h1>
    <form onsubmit="return validateForm()"><label>Name:</label><br><input type="text" id="name"><br><br><label>Email:</label><br><input type="text" id="email"><br><br><label>phoneno:</label><br><input type="number" id="phoneno"><br><br><label>age:</label><br><input type="number" id="age"><br><br><label>range :</label><br>
        <input type="range" id="date of birth"><br><br><input type="submit" value="Submit"></form>
</body>

</html>
